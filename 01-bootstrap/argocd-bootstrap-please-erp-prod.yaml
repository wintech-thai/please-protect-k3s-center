apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: bootstrap-please-erp-prod
  namespace: argocd
spec:
  generators:
  - clusters:
      selector:
        matchLabels:
          custom: "true"
  template:
    metadata:
      name: 'bootstrap-please-erp-prod'
    spec:
      project: "default"
      source:
        repoURL: https://github.com/wintech-thai/please-erp-control-plane.git
        targetRevision: "production" #Based on environment
        path: '.'
        helm:
          releaseName: please-erp-prod
          ignoreMissingValueFiles: true
          valueFiles:
            - values-files/values-production.yaml

            # redis
            - values-files/redis/redis-00-values.yaml

            # postgresql
            - values-files/postgresql/postgresql-00-values.yaml

            # please-erp-admin
            - values-files/please-erp-admin/please-erp-admin-00-values.yaml
            - values-files/please-erp-admin/please-erp-admin-01-production-values.yaml
            - values-files/please-erp-admin/please-erp-admin-03-production-image-tag.yaml

            # please-erp-tenant
            - values-files/please-erp-tenant/please-erp-tenant-00-values.yaml
            - values-files/please-erp-tenant/please-erp-tenant-01-production-values.yaml
            - values-files/please-erp-tenant/please-erp-tenant-03-production-image-tag.yaml

            # please-erp-web
            #- values-files/please-erp-web/please-erp-web-00-values.yaml
            #- values-files/please-erp-web/please-erp-web-01-production-values.yaml
            #- values-files/please-erp-web/please-erp-web-03-production-image-tag.yaml

            # onix-jobs
            - values-files/onix-jobs/onix-jobs-00-values.yaml
            - values-files/onix-jobs/onix-jobs-01-production-values.yaml
            - values-files/onix-jobs/onix-jobs-03-production-image-tag.yaml

            # onix-api
            - values-files/onix-api/onix-api-00-values.yaml
            - values-files/onix-api/onix-api-01-production-values.yaml
            - values-files/onix-api/onix-api-03-production-image-tag.yaml

      destination:
        name: in-cluster
        namespace: please-erp-production
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
