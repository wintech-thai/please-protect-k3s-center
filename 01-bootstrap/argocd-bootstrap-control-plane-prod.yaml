apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: bootstrap-control-plane-prod
  namespace: argocd
spec:
  generators:
  - clusters:
      selector:
        matchLabels:
          custom: "true"
  template:
    metadata:
      name: 'bootstrap-control-plane-prod'
    spec:
      project: "default"
      source:
        repoURL: http://gitea-http.gitea.svc.cluster.local:3000/local/control-plane-prod.git
        targetRevision: "production" #Based on environment
        path: '.'
        helm:
          releaseName: pp-prod
          ignoreMissingValueFiles: true
          valueFiles:
            - values-files/values-production.yaml

            # please-protect-center
            - values-files/please-protect-center/please-protect-center-00-values.yaml
            - values-files/please-protect-center/please-protect-center-01-production-values.yaml
            - values-files/please-protect-center/please-protect-center-03-production-image-tag.yaml

            # onix-jobs
            - values-files/onix-jobs/onix-jobs-00-values.yaml
            - values-files/onix-jobs/onix-jobs-01-production-values.yaml
            - values-files/onix-jobs/onix-jobs-03-production-image-tag.yaml

            # onix-api
            - values-files/onix-api/onix-api-00-values.yaml
            - values-files/onix-api/onix-api-01-production-values.yaml
            - values-files/onix-api/onix-api-03-production-image-tag.yaml
      destination:
        name: in-cluster
        namespace: pp-production
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
